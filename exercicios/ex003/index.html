<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com imagens</title>
</head>
<body>
    <h1>Testando carga e imagens</h1>
    <p>Abaixo veremos uma imagem que está na mesma pasta deste arquivo HTML:</p>
    <img src="logo-html200.png" alt="Logo HTML5">
    <p>Também podemos carregar imagens de outras pastas ou sub-pastas.</p>
    <img src="imagem/logo-css200.png" alt="Logo CSS">
    <p>Podemos também carregar imagens direto de uma URL</p>
    <img src="https://img.icons8.com/color/512/javascript--v2.png" alt="Logo JavaScript da web">
</body>
</html>
