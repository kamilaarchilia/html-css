<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML</title>
</head>
<body>
    <h1>Vídeos com HTML</h1>
    <p>Este é um exemplo de página HTML que mostra como inserir vídeos hospedados localmente.</p>
    <p>Esse vídeo está hospedado no meu próprio servidor</p>
    <video width="560" height="315" poster="imagem/capa.png" controls>
        <source src="midias/meu-video.mp4.mp4" type="video/mp4">
        Seu navegador não suporta a tag de vídeo.
    </video>

    <h1>Vídeo de serviço de vídeo (youtube)</h1>
 
    <iframe width="560" height="315" src="https://www.youtube.com/embed/OzUnqQk4eOg?si=sTVv6RBUB4-4ktJg" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    
</body>  
</html>
