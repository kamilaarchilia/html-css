<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>

        *{ /* Configuração global das CSS */
            height: 100%;
        }
        body {
            background-image: linear-gradient(90deg, #E900E0, #FE6BC4, #FE035A,#FF7E99,#FE9854,#FFEECD, #FFCD00);
        }
        /* 90deg representa o ângulo em graus do gradiente*/
        /* pode ser no lugar de graus usar to right, to left, to top, to bottom */
        /* para direita, esquerda, cima, baixo respectivamente */
    </style>
</head>
<body>
    <h1>Testando gradiente ou degradê</h1>
</body>
</html>
