<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Classe</title>
    <style>
        body{
            background-color: orchid;
        }
        div{
            display: inline-block;
            background-color: lightgray;
            text-align: center;
            width: 400px;
            height: 400px;
            border: 1px solid black; /* isso aqui é um shortcut para borda */
        }

        div:hover{
            background-color: lightblue; /* muda a cor de fundo quando passa o mouse */
            cursor: pointer; /* muda o cursor quando passa o mouse */
        }
    </style>
</head>
<body>
    <div id="d1">01</div> 
    <div id="d2">02</div>
    <div id="d3">03</div>
</body>
</html>
