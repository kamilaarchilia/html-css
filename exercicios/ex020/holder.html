<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de hover</title>
    <style>
        div{
            width: 350px;
            height: 350px;
            display: inline-block;
            border: 1px solid black;
            text-align: center;
            background-color: black;
        }

        #id1:hover{
            background-color: lightpink;
            cursor: pointer;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #id2:hover{
            background-color: rgb(91, 71, 241);
            cursor: pointer;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Exemplo de hover</h1>
    <p>Passe o mouse para a revelação</p>
    <div id="id1"> O bebê é MENINA</div>
    <div id="id2">O bebê é MENINO</div>
</body>
</html>
